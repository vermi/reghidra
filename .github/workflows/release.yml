name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: reghidra-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: reghidra-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: reghidra-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: reghidra-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux: install system dependencies for egui/eframe
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libglib2.0-dev libatk1.0-dev libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # macOS: create .app bundle
      - name: Create macOS app bundle
        if: runner.os == 'macOS'
        run: |
          APP_NAME="Reghidra"
          BUNDLE_DIR="target/$APP_NAME.app"
          CONTENTS="$BUNDLE_DIR/Contents"
          mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

          cp "target/${{ matrix.target }}/release/reghidra" "$CONTENTS/MacOS/reghidra"

          # Generate .icns from PNG
          ICON_PNG="assets/reghidra.png"
          if [ -f "$ICON_PNG" ]; then
            ICONSET="target/reghidra.iconset"
            mkdir -p "$ICONSET"
            for SIZE in 16 32 64 128 256 512; do
              sips -z $SIZE $SIZE "$ICON_PNG" --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null 2>&1
              DOUBLE=$((SIZE * 2))
              if [ $DOUBLE -le 1024 ]; then
                sips -z $DOUBLE $DOUBLE "$ICON_PNG" --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png" > /dev/null 2>&1
              fi
            done
            sips -z 1024 1024 "$ICON_PNG" --out "$ICONSET/icon_512x512@2x.png" > /dev/null 2>&1
            iconutil -c icns "$ICONSET" -o "$CONTENTS/Resources/reghidra.icns"
            rm -rf "$ICONSET"
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"

          cat > "$CONTENTS/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.reghidra.app</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>reghidra</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>CFBundleIconFile</key>
              <string>reghidra</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
          </dict>
          </plist>
          PLIST

          codesign --force --deep --sign - "$BUNDLE_DIR"

      # Package artifacts
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd target
          tar czf "${{ matrix.artifact }}.tar.gz" Reghidra.app
          cd ..
          cp "target/${{ matrix.target }}/release/reghidra-cli" "target/" 2>/dev/null || true
          if [ -f "target/${{ matrix.target }}/release/reghidra-cli" ]; then
            tar czf "target/${{ matrix.artifact }}-cli.tar.gz" -C "target/${{ matrix.target }}/release" reghidra-cli
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/reghidra" staging/
          cp "target/${{ matrix.target }}/release/reghidra-cli" staging/ 2>/dev/null || true
          tar czf "target/${{ matrix.artifact }}.tar.gz" -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/reghidra.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release/reghidra-cli.exe" staging/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/* -DestinationPath "target/${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.artifact }}.tar.gz
            target/${{ matrix.artifact }}.zip
            target/${{ matrix.artifact }}-cli.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Installation

            Download the archive for your platform below.

            ### macOS note
            After extracting, remove the quarantine attribute before launching:
            ```sh
            xattr -cr Reghidra.app
            ```
            Or right-click → **Open** → **Open** on first launch.
