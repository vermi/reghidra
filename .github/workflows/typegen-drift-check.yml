name: typegen drift check

# Verifies that the type archives checked into `types/` are byte-identical
# to what the current `tools/typegen` source would produce. The tool is a
# maintainer-only out-of-workspace crate; CI never auto-regenerates or
# commits on the maintainer's behalf — its only job here is to catch
# drift so a stale archive can't silently ship.
#
# When this job fails, the fix is always one of:
#   1. Regenerate the archive locally and commit the result:
#        cd tools/typegen
#        cargo run --release -- --source libc --target linux \
#            --out ../../types/posix.rtarch
#   2. Or, if the change to tools/typegen was unintended, revert it.
#
# The workflow intentionally does NOT push regenerated archives back to
# the PR branch — archive updates must always be a deliberate, reviewable
# commit by a human so the binary diff stays attached to the motivating
# source change.

on:
  pull_request:
    paths:
      - "types/**"
      - "tools/typegen/**"
      - ".github/workflows/typegen-drift-check.yml"
  push:
    branches: [main]
    paths:
      - "types/**"
      - "tools/typegen/**"
      - ".github/workflows/typegen-drift-check.yml"

env:
  CARGO_TERM_COLOR: always
  # Pinned Rizin commit used to regenerate `rizin-windows.rtarch` and
  # `rizin-libc.rtarch`. Bumping this constant *and* committing the
  # regenerated archives is the only legitimate way to refresh the
  # Rizin-sourced data — see `tools/typegen/src/walker/rizin_sdb.rs`
  # for the format the walker expects. The Rizin source itself is
  # GPLv3; any change to the pinned SHA must be matched by a LICENSE
  # update if the relicense terms shift upstream.
  RIZIN_REF: 183a0376c72b08a52863a6f98c832806b9d33b1e

jobs:
  drift-check:
    name: Verify bundled type archives are current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache typegen build artifacts
        uses: actions/cache@v4
        with:
          # `tools/typegen` has its own Cargo.lock because it's an
          # out-of-workspace crate; cache its target dir and registry
          # separately from the main workspace to avoid cross-pollution.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/typegen/target
          key: typegen-${{ runner.os }}-${{ hashFiles('tools/typegen/Cargo.lock') }}

      - name: Fetch pinned Rizin source for SDB walker
        run: |
          # The Rizin SDB walker reads `librz/arch/types/functions-*.sdb.txt`
          # straight from a Rizin checkout. We pin to a specific SHA via
          # the `RIZIN_REF` env so the regenerated archive bytes are
          # reproducible across CI runs and across maintainer machines.
          # Shallow clone keeps it cheap (Rizin is large).
          git clone --filter=blob:none --no-checkout https://github.com/rizinorg/rizin.git /tmp/rizin-src
          cd /tmp/rizin-src
          git fetch --depth 1 origin "${RIZIN_REF}"
          git checkout --quiet "${RIZIN_REF}"
          ls librz/arch/types/functions-windows.sdb.txt librz/arch/types/functions-libc.sdb.txt

      - name: Regenerate all archives into scratch dir
        run: |
          mkdir -p /tmp/typegen-out
          cd tools/typegen
          # POSIX / libc — target linux.
          cargo run --release --quiet -- \
              --source libc --target linux \
              --out /tmp/typegen-out/posix.rtarch
          # Windows / windows-sys — one archive per supported target.
          # We deliberately regenerate all three even though most PRs
          # will only touch one, because walker changes affect all
          # outputs and missing any of them in the drift check would
          # let stale variants slip through.
          cargo run --release --quiet -- \
              --source windows-sys --target windows-x64 \
              --out /tmp/typegen-out/windows-x64.rtarch
          cargo run --release --quiet -- \
              --source windows-sys --target windows-x86 \
              --out /tmp/typegen-out/windows-x86.rtarch
          cargo run --release --quiet -- \
              --source windows-sys --target windows-arm64 \
              --out /tmp/typegen-out/windows-arm64.rtarch
          # MSVC CRT (UCRT) — sourced from libc's `src/windows/` tree.
          # Covers `_open`, `_close`, `_commit`, `printf`, etc., the
          # public CRT surface that FLIRT picks up in statically linked
          # MSVC binaries. This is the Windows companion to posix.
          cargo run --release --quiet -- \
              --source libc --target windows-x64 \
              --out /tmp/typegen-out/ucrt.rtarch
          # Rizin SDB — Windows headers (one consolidated archive
          # over all 35 functions-windows*.sdb.txt files) and POSIX
          # family (libc + linux + macos). These run last because
          # they only fill gaps left by the windows-sys/libc-derived
          # archives at runtime; the bytes themselves still need to
          # be regenerated whenever either the walker or the pinned
          # Rizin SHA changes.
          cargo run --release --quiet -- \
              --source rizin-sdb --target linux \
              --input /tmp/rizin-src/librz/arch/types \
              --filter windows \
              --out /tmp/typegen-out/rizin-windows.rtarch
          cargo run --release --quiet -- \
              --source rizin-sdb --target linux \
              --input /tmp/rizin-src/librz/arch/types \
              --filter libc,linux,macos \
              --out /tmp/typegen-out/rizin-libc.rtarch

      - name: Diff against checked-in archives
        run: |
          # A small shell helper keeps the per-archive diff logic
          # in one place. On mismatch we print both sizes and the
          # exact regeneration command so the fix is copy-pasteable.
          check() {
            local stem="$1"
            local src_args="$2"
            if ! cmp -s "types/${stem}.rtarch" "/tmp/typegen-out/${stem}.rtarch"; then
              echo "::error::types/${stem}.rtarch is out of sync with tools/typegen source."
              echo "  Checked-in size:   $(wc -c < "types/${stem}.rtarch") bytes"
              echo "  Regenerated size:  $(wc -c < "/tmp/typegen-out/${stem}.rtarch") bytes"
              echo ""
              echo "  To fix, run locally and commit the updated archive:"
              echo "    cd tools/typegen"
              echo "    cargo run --release -- ${src_args} --out ../../types/${stem}.rtarch"
              return 1
            fi
            echo "types/${stem}.rtarch is current."
          }
          check posix         "--source libc --target linux" || exit 1
          check windows-x64   "--source windows-sys --target windows-x64" || exit 1
          check windows-x86   "--source windows-sys --target windows-x86" || exit 1
          check windows-arm64 "--source windows-sys --target windows-arm64" || exit 1
          check ucrt          "--source libc --target windows-x64" || exit 1
          check rizin-windows "--source rizin-sdb --target linux --input /tmp/rizin-src/librz/arch/types --filter windows" || exit 1
          check rizin-libc    "--source rizin-sdb --target linux --input /tmp/rizin-src/librz/arch/types --filter libc,linux,macos" || exit 1
